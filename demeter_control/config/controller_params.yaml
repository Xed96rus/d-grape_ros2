/**/controller_manager:
  ros__parameters:

    use_sim_time: true # This will be set to false on real robot in launch file

    update_rate: 1000

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController
    
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster


/**/diff_drive_controller:
  ros__parameters:

    use_sim_time: true # This will be set to false on real robot in launch file

    publish_rate: 50.0 # You can set this higher than the controller manager update rate, but it will be throttled

    wheels_per_side: 6
    use_stamped_vel: false # Depending on if cmd_vel is presented as Twist or TwistStamped:
    enable_odom_tf: true

    # Robot model
    base_frame_id: base_link
    left_wheel_names: [
      "Left_motor_zad",
      "Caretca_left_zad_1",
      "Caretca_left_zad_2",
      "Caretca_left_pered_1",
      "Caretca_left_pered_2",
      "Left_motor_pered"
    ]
    right_wheel_names: [
      "Right_motor_zad",
      "Caretca_prav_zad_1",
      "Caretca_prav_zad_2",
      "Caretca_prav_pered_1",
      "Caretca_prav_pered_2",
      "Right_motor_pered"
    ]
    wheel_separation: 1.198
    wheel_radius: 0.370